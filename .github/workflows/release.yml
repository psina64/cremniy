name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: cremniy-linux
          - os: windows-latest
            artifact_name: cremniy-windows
          - os: macos-latest
            artifact_name: cremniy-macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Qt
        uses: jurplel/install-qt-action@v3
        with:
          version: '6.5.3'
          cache: false

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgl1-mesa-dev libxkbcommon-x11-0 libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-render-util0 libxcb-xinerama0 libxcb-cursor0 libfuse2 file imagemagick
          
      - name: Download linuxdeploy tools
        if: runner.os == 'Linux'
        run: |
          wget -q https://github.com/linuxdeploy/linuxdeploy/releases/download/continuous/linuxdeploy-x86_64.AppImage
          wget -q https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-x86_64.AppImage
          chmod +x linuxdeploy-x86_64.AppImage
          chmod +x linuxdeploy-plugin-qt-x86_64.AppImage

      - name: Configure CMake
        run: cmake -B build -S src -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package (Linux) - tar.gz
        if: runner.os == 'Linux'
        run: |
          mkdir -p package
          cp build/cremniy package/
          cd package
          tar -czf ../${{ matrix.artifact_name }}.tar.gz *
          
      - name: Package (Linux) - AppImage
        if: runner.os == 'Linux'
        run: |
          # Resize icon to 256x256 for AppImage compatibility
          convert src/resources/icons/icon.png -resize 256x256 cremniy-256.png
          
          export QML_SOURCES_PATHS=${{ github.workspace }}/src
          export QMAKE=$Qt6_DIR/bin/qmake
          ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/cremniy \
            --desktop-file cremniy.desktop \
            --icon-file cremniy-256.png \
            --plugin qt \
            --output appimage
          mv Cremniy-*.AppImage ${{ matrix.artifact_name }}.AppImage || mv cremniy-*.AppImage ${{ matrix.artifact_name }}.AppImage

      - name: Package (Windows)
        if: runner.os == 'Windows'
        run: |
          New-Item -ItemType Directory -Path package -Force
          Copy-Item build/Release/cremniy.exe package/
          windeployqt package/cremniy.exe
          Compress-Archive -Path package/* -DestinationPath ${{ matrix.artifact_name }}.zip

      - name: Package (macOS)
        if: runner.os == 'macOS'
        run: |
          mkdir -p package
          cp -r build/cremniy.app package/
          macdeployqt package/cremniy.app
          cd package
          tar -czf ../${{ matrix.artifact_name }}.tar.gz *

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: |
            ${{ matrix.artifact_name }}.tar.gz
            ${{ matrix.artifact_name }}.zip
            ${{ matrix.artifact_name }}.AppImage

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            artifacts/**/*.AppImage
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
